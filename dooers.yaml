protocol_version: "2"
name: WhatsApp Franquia
description: Agente operacional para gestão de treinamentos e recrutamento de uma rede de franquias de estética.
message_path: /
message_scheme: wss
whatsapp:
  enabled: true
  path: /whatsapp/inbound
profile:
  summary: Assistente operacional via WhatsApp para franquias de estética — treinamentos e recrutamento.
  capabilities:
    - gestão de treinamentos e cronograma
    - confirmação de presença via WhatsApp
    - relatórios de presença
    - pipeline de recrutamento
    - análise de currículos com IA
    - perfil comportamental de candidatos
    - webhooks Tally para formulários
  tools:
    - consultar cronograma de treinamentos
    - enviar confirmações de presença
    - relatório de presença por treinamento
    - listar e ranquear candidatos
    - analisar currículo via GPT-4o
    - contatar candidatos via WhatsApp
ui:
  suggested_prompts:
    - title: Treinamentos do mês
      prompt: Quais são os treinamentos previstos para este mês?
    - title: Confirmar presença
      prompt: Quero enviar confirmação de presença para o próximo treinamento
    - title: Candidatos disponíveis
      prompt: Mostre os candidatos disponíveis para as vagas abertas
    - title: Relatório de presença
      prompt: Gere o relatório de presença do último treinamento
